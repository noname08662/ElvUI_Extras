name: Test Pack and Artifact

on:
  workflow_dispatch: 
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  
jobs:
  pack-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Environment Variables
        run: |
          REPO_NAME="${{ github.event.repository.name || github.event.repository.name }}"
          if [ -z "$REPO_NAME" ]; then REPO_NAME="test-repo"; fi

          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          if [ "$IS_PRERELEASE" = "false" ] || [ -z "$IS_PRERELEASE" ]; then
            SUFFIX="ElvUI_6.09"
          else
            SUFFIX="ElvUI_7"
          fi

          echo "ZIP_NAME=${REPO_NAME}_${SUFFIX}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${REPO_NAME}" >> "$GITHUB_ENV"

      - name: Prepare and Package Files
        run: |
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/$REPO_NAME"

          rsync -av \
            --exclude '.*' \
            --exclude '*.zip' \
            --exclude "$REPO_NAME" \
            ./ "$STAGE/$REPO_NAME/"

          cd "$STAGE"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME.zip" "$REPO_NAME"

      - name: Upload Zip as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}-test
          path: "${{ env.ZIP_NAME }}.zip"
          retention-days: 1
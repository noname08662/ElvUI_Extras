name: Pack and Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  
jobs:
  pack-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Environment Variables
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [ "${{ github.event.release.prerelease }}" = "false" ]; then
            SUFFIX="ElvUI_6.09"
          else
            SUFFIX="ElvUI_7"
          fi

          echo "ZIP_NAME=${REPO_NAME}_${SUFFIX}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${REPO_NAME}" >> "$GITHUB_ENV"

      - name: Prepare and Package Files
        run: |
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/${{ env.REPO_NAME }}"

          rsync -av \
            --exclude '.*' \
            --exclude '*.zip' \
            --exclude "${{ env.REPO_NAME }}" \
            ./ "$STAGE/${{ env.REPO_NAME }}/"

          cd "$STAGE"
          zip -r "$GITHUB_WORKSPACE/${{ env.ZIP_NAME }}.zip" "${{ env.REPO_NAME }}"

      - name: Upload Zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ env.ZIP_NAME }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}